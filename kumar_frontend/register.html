<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KumarBrothers | User Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="js/config.js"></script>

  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .register-container {
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .register-title {
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 5px;
      color: #1f2933;
    }

    .register-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .btn-register {
      background-color: #1f2933;
      color: white;
      font-weight: 600;
    }

    .btn-register:hover {
      background-color: #111827;
    }

    .note {
      font-size: 12px;
      color: #dc2626;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">🏗️ KumarBrothers</span>
    <a href="index.html" class="nav-link text-white">Dashboard</a>
  </nav>

  <div class="register-container">
    <div class="register-title">Create New User</div>
    <div class="register-subtitle">
      Only authorized personnel can create user accounts
    </div>

    <form id="registerForm">

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" required>
          <option value="">Select Role</option>
          <option>Boss</option>
          <option>Software Supervisor</option>
          <option>User</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" required>
        </div>
      </div>

      <button type="submit" class="btn btn-register w-100">
        Create User
      </button>

      <div class="note">
        ⚠ This page should only be accessible to Boss or Software Supervisor.
      </div>

    </form>
  </div>

  <!-- Auth JS -->
  <script>
    // Protect this page client-side: only Boss or Software Supervisor allowed
    (function(){
      if (!KBAuth.isAuthenticated()) return window.location.href = 'login.html';
      var role = KBAuth.getRole();
      if (role !== 'Boss' && role !== 'Software Supervisor') return window.location.href = 'index.html';
    })();

    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = this;
      const full_name = form.querySelector('input[placeholder]')?.value || form.querySelector('input[type=text]')?.value || '';
      const email = form.querySelector('input[type=email]').value;
      const username = form.querySelector('input[type=text]').value;
      const phone = form.querySelector('input[type=tel]').value;
      const role = form.querySelector('select').value;
      const password = form.querySelector('input[type=password]').value;

      const statusEl = document.createElement('div');
      form.appendChild(statusEl);

      try{
        const API_BASE = (typeof KBConfig !== 'undefined') ? KBConfig.API_BASE : 'http://127.0.0.1:8000';
        const token = (typeof KBAuth !== 'undefined') ? KBAuth.getToken() : localStorage.getItem('kb_token');
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ full_name, email, username, password, role })
        });
        const data = await res.json();
        if(!res.ok){
          statusEl.textContent = '';
          const errDiv = document.createElement('div');
          errDiv.className = 'text-danger mt-2';
          errDiv.textContent = (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail)) || 'Registration failed';
          statusEl.appendChild(errDiv);
          return;
        }
        statusEl.textContent = '';
        const successDiv = document.createElement('div');
        successDiv.className = 'text-success mt-2';
        successDiv.textContent = 'User created successfully';
        statusEl.appendChild(successDiv);
        // If we set a development token earlier, clean it up so we don't leave a stray dev credential
        if(localStorage.getItem('kb_token') === 'dev-token'){
          localStorage.removeItem('kb_token');
          localStorage.removeItem('kb_role');
        }
        setTimeout(()=> window.location.href = 'index.html', 900);
      }catch(err){
        statusEl.textContent = '';
        const catchDiv = document.createElement('div');
        catchDiv.className = 'text-danger mt-2';
        catchDiv.textContent = 'Error: ' + err.message;
        statusEl.appendChild(catchDiv);
      }
    });
  </script>

</body>
</html>
