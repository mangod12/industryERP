<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>KumarBrothers | User Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="js/config.js"></script>

  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .register-container {
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .register-title {
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 5px;
      color: #1f2933;
    }

    .register-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .btn-register {
      background-color: #1f2933;
      color: white;
      font-weight: 600;
    }

    .btn-register:hover {
      background-color: #111827;
    }

    .note {
      font-size: 12px;
      color: #dc2626;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">🏗️ KumarBrothers</span>
    <a href="index.html" class="nav-link text-white">Dashboard</a>
  </nav>

  <div class="register-container">
    <div class="register-title">Create New User</div>
    <div class="register-subtitle">
      Only authorized personnel (Boss, Supervisors) can create user accounts
    </div>

    <form id="registerForm">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" id="username" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" id="roleSelect" required>
            <option value="">Select Role</option>
            <option value="Boss">Boss</option>
            <option value="Software Supervisor">Software Supervisor</option>
            <option value="User">User</option>
            <option value="Fabricator">Fabricator</option>
            <option value="Painter">Painter</option>
            <option value="Dispatch">Dispatch</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="password" class="form-control" required minlength="8">
            <button class="btn btn-outline-secondary pw-toggle" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
              minlength="8">
            <button class="btn btn-outline-secondary pw-toggle" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-register w-100">
        Create User
      </button>

      <div class="note">
        ⚠ This page is restricted to Boss and Software Supervisors only.
      </div>

    </form>
  </div>

  <!-- Auth JS -->
  <script>
    // Protect this page client-side: only Boss or Software Supervisor allowed
    (function () {
      const role = localStorage.getItem('kb_role');
      const token = localStorage.getItem('kb_token');

      if (!token) return window.location.href = 'login.html';

      // Allow Boss OR Software Supervisor
      // Normalize check (backend roles are Title Case)
      if (role !== 'Boss' && role !== 'Software Supervisor') {
        alert('Access Denied: Only Boss or Software Supervisor can create users.');
        return window.location.href = 'index.html';
      }
    })();

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const form = this;
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const roleValue = document.getElementById('roleSelect').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;

      // Remove existing status messages
      const existingStatus = form.querySelector('.status-msg');
      if (existingStatus) existingStatus.remove();

      const statusEl = document.createElement('div');
      statusEl.className = 'status-msg mt-3';
      form.appendChild(statusEl);

      if (password !== confirm) {
        statusEl.innerHTML = `<div class='text-danger'>Passwords do not match</div>`;
        return;
      }

      const payload = {
        username: username,
        email: email,
        password: password,
        role: roleValue // Sending Title Case directly (e.g. "Software Supervisor")
      };

      try {
        const API_BASE = (typeof KBConfig !== 'undefined') ? KBConfig.API_BASE : 'http://127.0.0.1:8000';
        const token = localStorage.getItem('kb_token');

        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => null);

        if (!res.ok) {
          statusEl.innerHTML = `<div class='text-danger'>${data?.detail || 'Registration failed'}</div>`;
          return;
        }

        statusEl.innerHTML = `<div class='text-success fw-bold'>User created successfully! Redirecting...</div>`;
        form.reset();

        setTimeout(() => window.location.href = 'index.html', 1500);

      } catch (err) {
        statusEl.innerHTML = `<div class='text-danger'>Error: ${err.message}</div>`;
      }
    });
  </script>

  <script>
    // Password visibility toggle
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.input-group').querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
      });
    });
  </script>

</body>

</html>
