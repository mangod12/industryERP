<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KumarBrothers — Queries</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="css/main.css" rel="stylesheet">
  <style>
    .query-card {
      border-left: 4px solid #6c757d;
      transition: box-shadow 0.2s;
    }

    .query-card:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .query-card.status-open {
      border-left-color: #ffc107;
    }

    .query-card.status-in_progress {
      border-left-color: #0d6efd;
    }

    .query-card.status-closed {
      border-left-color: #198754;
    }

    .query-meta {
      font-size: 0.82rem;
      color: #6c757d;
    }

    .query-msg {
      white-space: pre-wrap;
      margin-top: 6px;
    }

    .admin-reply {
      background: #f0f7ff;
      border-left: 3px solid #0d6efd;
      padding: 10px 14px;
      margin-top: 10px;
      border-radius: 4px;
    }

    .status-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }
  </style>
</head>

<body>
  <nav class="kb-navbar d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
      <div class="navbar-brand">KumarBrothers</div>
      <div class="d-none d-lg-flex">
        <a class="nav-link text-white ms-3" href="index.html">Dashboard</a>
        <a class="nav-link text-white ms-3" href="raw_material.html">Inventory</a>
        <a class="nav-link text-white ms-3" href="scrap.html">Scrap</a>
        <a class="nav-link text-white ms-3" href="reusable.html">Reusable</a>
        <a class="nav-link text-white ms-3" href="customers.html">Customers</a>
        <a class="nav-link text-white ms-3" href="tracking_v2.html">Tracking</a>
        <a class="nav-link text-white ms-3" href="queries.html">Querys</a>
        <a class="nav-link text-white ms-3" href="instructions.html">Instructions</a>
        <a class="nav-link text-white ms-3" href="settings.html">Settings</a>
        <a class="nav-link text-white ms-3" href="register.html" data-permission="users:create">Register</a>
        <a class="nav-link text-white ms-3 kb-logout" href="#">Logout</a>
      </div>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="small-muted">Role:</div>
      <div id="current-role" class="role-badge">Loading...</div>
    </div>
  </nav>

  <div class="container-fluid main-container">
    <div class="row">

      <!-- Header -->
      <div class="col-12 mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h2 class="fw-bold mb-0">Queries / Issues</h2>
            <small class="text-muted">Raise issues and track their status</small>
          </div>
          <div>
            <span class="text-muted small" id="dateTimeDisplay"></span>
          </div>
        </div>
      </div>

      <!-- Submit Query Form -->
      <div class="col-lg-5 mb-3">
        <div class="panel">
          <h5 class="mb-3"><i class="bi bi-plus-circle"></i> Submit a Query</h5>
          <form id="queryForm">
            <div class="mb-3">
              <label class="form-label fw-bold">Title</label>
              <input type="text" id="qTitle" class="form-control" placeholder="Brief title for the issue" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Description</label>
              <textarea id="qMessage" class="form-control" rows="4" placeholder="Describe the issue in detail..."
                required></textarea>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <div id="qStatus" class="small text-muted"></div>
              <button type="submit" class="btn btn-kb">
                <i class="bi bi-send"></i> Submit Query
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Query List -->
      <div class="col-lg-7 mb-3">
        <div class="panel">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-list-check"></i> <span id="listTitle">My Queries</span></h5>
            <div>
              <select id="statusFilter" class="form-select form-select-sm" style="width: auto; display: inline-block;">
                <option value="">All Status</option>
                <option value="OPEN">Open</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="CLOSED">Closed</option>
              </select>
            </div>
          </div>
          <div id="queryList">
            <div class="text-muted">Loading queries...</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Reply Modal (Boss/Supervisor only) -->
  <div class="modal fade" id="replyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Reply to Query</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2">
            <strong>Query:</strong>
            <div id="replyQueryTitle" class="text-muted"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Your Reply</label>
            <textarea id="replyText" class="form-control" rows="3" placeholder="Type your reply..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Update Status</label>
            <select id="replyStatus" class="form-select">
              <option value="IN_PROGRESS">In Progress</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>
          <div id="replyStatusMsg" class="small"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="replySubmitBtn" class="btn btn-kb">Send Reply</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>
    const API_BASE = (typeof KBConfig !== 'undefined') ? KBConfig.API_BASE : 'http://127.0.0.1:8000';
    const userRole = (typeof KBAuth !== 'undefined') ? KBAuth.getRole() : (localStorage.getItem('kb_role') || 'User');
    const isBossOrSupervisor = (userRole === 'Boss' || userRole === 'Software Supervisor');
    let currentUserId = null;

    function authHeaders() {
      const token = (typeof KBAuth !== 'undefined') ? KBAuth.getToken() : localStorage.getItem('kb_token');
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    // Fetch current user's ID so we can show delete on own queries
    async function fetchCurrentUserId() {
      try {
        const res = await fetch(`${API_BASE}/users/me`, { headers: authHeaders() });
        if (res.ok) {
          const user = await res.json();
          currentUserId = user.id;
        }
      } catch (err) { console.error('Failed to fetch user ID:', err); }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function statusBadge(status) {
      const s = (status || '').toUpperCase();
      if (s === 'OPEN') return '<span class="status-badge bg-warning text-dark">Open</span>';
      if (s === 'IN_PROGRESS') return '<span class="status-badge bg-primary text-white">In Progress</span>';
      if (s === 'CLOSED') return '<span class="status-badge bg-success text-white">Closed</span>';
      return `<span class="status-badge bg-secondary">${escapeHtml(status)}</span>`;
    }

    // Show current date/time
    document.getElementById('dateTimeDisplay').textContent =
      'Date & Time: ' + new Date().toLocaleString();

    // Update list title based on role
    if (isBossOrSupervisor) {
      document.getElementById('listTitle').textContent = 'All Queries';
    }

    // ---------- Submit Query ----------
    document.getElementById('queryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('qTitle').value.trim();
      const message = document.getElementById('qMessage').value.trim();
      const statusEl = document.getElementById('qStatus');

      if (!title || !message) return;

      statusEl.innerText = 'Submitting...';
      try {
        const res = await fetch(`${API_BASE}/queries/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ title, message })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => null);
          statusEl.innerHTML = `<span class="text-danger">${err?.detail || 'Failed (' + res.status + ')'}</span>`;
          return;
        }
        document.getElementById('qTitle').value = '';
        document.getElementById('qMessage').value = '';
        statusEl.innerHTML = '<span class="text-success">✓ Query submitted!</span>';
        setTimeout(() => { statusEl.innerText = ''; }, 2000);
        loadQueries();
      } catch (err) {
        statusEl.innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
      }
    });

    // ---------- Load Queries ----------
    async function loadQueries() {
      const listEl = document.getElementById('queryList');
      listEl.innerHTML = '<div class="text-muted">Loading...</div>';

      // Boss/Supervisor see all, regular users see their own
      const endpoint = isBossOrSupervisor ? '/queries/' : '/queries/me';

      try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          headers: authHeaders()
        });
        if (!res.ok) {
          listEl.innerHTML = '<div class="text-danger">Failed to load queries</div>';
          return;
        }
        const items = await res.json();

        // Apply status filter
        const filterVal = document.getElementById('statusFilter').value;
        const filtered = filterVal
          ? items.filter(q => q.status === filterVal)
          : items;

        if (!filtered.length) {
          listEl.innerHTML = '<div class="text-muted">No queries found.</div>';
          return;
        }

        listEl.innerHTML = '';
        filtered.forEach(q => {
          const statusClass = `status-${(q.status || '').toLowerCase()}`;
          const dateStr = q.created_at ? new Date(q.created_at).toLocaleString() : '';

          let replyHtml = '';
          if (q.admin_reply) {
            replyHtml = `
              <div class="admin-reply">
                <div class="small fw-bold text-primary"><i class="bi bi-reply"></i> Admin Reply:</div>
                <div>${escapeHtml(q.admin_reply)}</div>
              </div>
            `;
          }

          let actionsHtml = '';
          const isMyQuery = (currentUserId !== null && q.created_by === currentUserId);
          const showReply = isBossOrSupervisor && q.status !== 'CLOSED';
          const showDelete = isMyQuery;

          if (showReply || showDelete) {
            actionsHtml = '<div class="mt-2">';
            if (showReply) {
              actionsHtml += `<button class="btn btn-sm btn-outline-primary reply-btn me-1" data-id="${q.id}" data-title="${escapeHtml(q.title)}"><i class="bi bi-reply"></i> Reply</button>`;
            }
            if (showDelete) {
              actionsHtml += `<button class="btn btn-sm btn-outline-danger del-query-btn" data-id="${q.id}"><i class="bi bi-trash"></i> Delete</button>`;
            }
            actionsHtml += '</div>';
          }

          const div = document.createElement('div');
          div.className = `card kb-card p-3 mb-2 query-card ${statusClass}`;
          div.innerHTML = `
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <strong>${escapeHtml(q.title)}</strong>
                <div class="query-meta"><i class="bi bi-clock"></i> ${dateStr}</div>
              </div>
              ${statusBadge(q.status)}
            </div>
            <div class="query-msg">${escapeHtml(q.message)}</div>
            ${replyHtml}
            ${actionsHtml}
          `;
          listEl.appendChild(div);
        });

        // Wire reply buttons
        listEl.querySelectorAll('.reply-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            openReplyModal(btn.dataset.id, btn.dataset.title);
          });
        });

        // Wire delete buttons
        listEl.querySelectorAll('.del-query-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            if (!confirm('Delete this query?')) return;
            try {
              const res = await fetch(`${API_BASE}/queries/${id}`, {
                method: 'DELETE',
                headers: authHeaders()
              });
              if (res.status === 204 || res.ok) {
                loadQueries();
              } else {
                const err = await res.json().catch(() => null);
                alert(err?.detail || 'Delete failed');
              }
            } catch (err) {
              alert('Error: ' + err.message);
            }
          });
        });

      } catch (err) {
        listEl.innerHTML = `<div class="text-danger">Error: ${err.message}</div>`;
      }
    }

    // ---------- Status filter ----------
    document.getElementById('statusFilter').addEventListener('change', loadQueries);

    // ---------- Reply Modal ----------
    let currentReplyQueryId = null;

    function openReplyModal(queryId, title) {
      currentReplyQueryId = queryId;
      document.getElementById('replyQueryTitle').textContent = title;
      document.getElementById('replyText').value = '';
      document.getElementById('replyStatusMsg').textContent = '';
      const modal = new bootstrap.Modal(document.getElementById('replyModal'));
      modal.show();
    }

    document.getElementById('replySubmitBtn').addEventListener('click', async () => {
      const reply = document.getElementById('replyText').value.trim();
      const status = document.getElementById('replyStatus').value;
      const statusMsg = document.getElementById('replyStatusMsg');

      if (!reply) {
        statusMsg.innerHTML = '<span class="text-danger">Please enter a reply</span>';
        return;
      }

      statusMsg.innerText = 'Sending...';
      try {
        const res = await fetch(`${API_BASE}/queries/${currentReplyQueryId}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ reply, status })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => null);
          statusMsg.innerHTML = `<span class="text-danger">${err?.detail || 'Failed'}</span>`;
          return;
        }
        statusMsg.innerHTML = '<span class="text-success">✓ Reply sent!</span>';
        setTimeout(() => {
          bootstrap.Modal.getInstance(document.getElementById('replyModal'))?.hide();
          loadQueries();
        }, 800);
      } catch (err) {
        statusMsg.innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
      }
    });

    // ---------- Initial Load ----------
    (async () => {
      await fetchCurrentUserId();
      loadQueries();
    })();
  </script>
</body>

</html>
