<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KumarBrothers — Queries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
  </head>
  <body>
    <div id="navbar-container"></div>
  <div class="content container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Queries / Issues</h2>
      <div class="small text-muted">Auto time shown in form</div>
    </div>

    <section class="panel mb-3">
      <form>
        <div class="mb-2">
          <label class="form-label">Issue Description</label>
          <textarea class="form-control" rows="3" placeholder="Describe the issue"></textarea>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-sm-6"><label class="form-label">Customer</label><select class="form-select"><option>ABC Constructions</option><option>Gamma Interiors</option></select></div>
          <div class="col-sm-6"><label class="form-label">Production Stage</label><select class="form-select"><option>Cutting</option><option>Assembly</option><option>Painting</option></select></div>
        </div>
        <div class="mb-2">
          <label class="form-label">Photo (optional)</label>
          <input type="file" class="form-control">
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <div class="text-muted small">Date & Time: 2026-01-03 09:12</div>
          <button class="btn btn-primary">Submit Query</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h5>Query List</h5>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr>
              <th>Date & Time</th>
              <th>Customer</th>
              <th>Stage</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>2026-01-03 09:05</td>
              <td>ABC Constructions</td>
              <td>Cutting</td>
              <td><span class="status-pill status-inprogress">Open</span></td>
            </tr>
            <tr>
              <td>2026-01-02 15:20</td>
              <td>Gamma Interiors</td>
              <td>Assembly</td>
              <td><span class="status-pill status-completed">Closed</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/modules/escapeHtml.js"></script>
  <script src="js/modules/navbar.js"></script>
  <script src="js/modules/debounce.js"></script>
  <script src="js/modules/store.js"></script>
  <script src="js/modules/error-handler.js"></script>
  <script src="js/modules/ui-components.js"></script>
  <script src="js/modules/pagination.js"></script>
  <script>
    if (!KBAuth.requireAuth()) throw new Error('Not authenticated');
    KBNavbar.render('navbar-container', 'queries');
  </script>
  </body>
</html>
