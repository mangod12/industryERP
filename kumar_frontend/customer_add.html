    <main class="kb-main">
    <div class="container main-container py-4">
      <h1 class="h3">Add Customer</h1>
      <div class="card p-4 mt-3">
        <form id="addCustomerForm">
          <div class="mb-3">
            <label for="c_name" class="form-label">Customer Name</label>
            <input type="text" id="c_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="c_project" class="form-label">Project Details</label>
            <textarea id="c_project" class="form-control" rows="4"></textarea>
          </div>
          <div class="mb-3">
            <label for="c_email" class="form-label">Email</label>
            <input type="email" id="c_email" class="form-control" placeholder="contact@example.com">
          </div>
          <div class="mb-3">
            <label for="c_phone" class="form-label">Phone</label>
            <input type="text" id="c_phone" class="form-control" placeholder="+91-XXXXXXXXXX">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-kb" type="submit">Save Customer</button>
            <a class="btn btn-outline-secondary" href="customers.html">Cancel</a>
          </div>
          <div id="status" class="mt-3"></div>
        </form>
      </div>
    </div>
    </main>

    <script src="js/config.js?v=20260416"></script>
    <script src="js/main.js?v=20260416"></script>
    <script>
      document.getElementById('addCustomerForm').addEventListener('submit', async function(e){
        e.preventDefault();
        const name = document.getElementById('c_name').value.trim();
        const project = document.getElementById('c_project').value.trim();
        const email = document.getElementById('c_email').value.trim();
        const phone = document.getElementById('c_phone').value.trim();
        const statusEl = document.getElementById('status');

        // client-side validation
        if(!name){ statusEl.innerHTML = `<div class='text-danger'>Name is required</div>`; return; }
        if(email && !/^\S+@\S+\.\S+$/.test(email)){ statusEl.innerHTML = `<div class='text-danger'>Invalid email format</div>`; return; }
        if(phone && !/^[0-9+\-() ]{6,30}$/.test(phone)){ statusEl.innerHTML = `<div class='text-danger'>Invalid phone format</div>`; return; }

        try{
          const payload = { name, project_details: project };
          if(email) payload.email = email;
          if(phone) payload.phone = phone;

          const res = await fetch(`${(typeof KBConfig!=='undefined'?KBConfig.API_BASE:'http://127.0.0.1:8000')}/customers`, {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
          });
          const j = await res.json().catch(()=>null);
          if(!res.ok){ statusEl.innerHTML = `<div class='text-danger'>${j?.detail||'Failed to create'}</div>`; return; }
          statusEl.innerHTML = `<div class='text-success'>Customer created</div>`;
          setTimeout(()=> location.href = 'customers.html', 800);
        }catch(err){ statusEl.innerHTML = `<div class='text-danger'>${err.message}</div>`; }
      });
    </script>
