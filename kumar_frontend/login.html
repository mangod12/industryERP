<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>KumarBrothers | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background-color: var(--surface);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      margin: 0;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .login-card {
      background: var(--surface-raised);
      width: 100%;
      border-radius: 12px;
      padding: 36px 32px 28px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 4px;
    }

    .login-brand-name {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--primary);
      letter-spacing: 0.2px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      font-weight: 400;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid #d1d5db;
      padding: 10px 12px;
      font-size: 14px;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 90, 138, 0.1);
    }

    .btn-login {
      background-color: var(--primary);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
    }

    .btn-login:hover {
      background-color: #174d76;
      color: #fff;
    }

    .btn-login:active {
      background-color: #13415f;
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .register-link {
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .register-link small {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .register-link .btn {
      font-size: 13px;
      font-weight: 500;
    }

    .input-group .btn-outline-secondary {
      border-color: #d1d5db;
      color: var(--text-secondary);
    }

    .input-group .btn-outline-secondary:hover {
      background-color: var(--surface);
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <h1 class="login-brand-name">KumarBrothers Steel</h1>
      </div>
      <div class="login-subtitle">
        Production Tracking System
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="email-username" class="form-label">Email / Username</label>
          <input id="email-username" type="text" class="form-control" placeholder="Enter your email or username" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <input id="password" type="password" class="form-control" placeholder="Enter password" required>
            <button class="btn btn-outline-secondary pw-toggle" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100">
          Login
        </button>
      </form>

      <div class="register-link">
        <small>Don't have an account?</small>
        <div class="mt-2">
          <a href="register.html" class="btn btn-outline-primary btn-sm">Create an account</a>
        </div>
      </div>

      <div class="footer-text">
        &copy; 2026 KumarBrothers. Internal Use Only.
      </div>
    </div>
  </div>

  <!-- Config JS -->
  <script src="js/config.js?v=20260416"></script>

  <!-- Auth JS -->
  <script>
    // Redirect if already logged in
    if (typeof KBAuth !== 'undefined' && KBAuth.isAuthenticated()) {
      window.location.href = 'index.html';
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const form = this;
      const username = form.querySelector('input[type=text]').value.trim();
      const password = form.querySelector('.input-group input').value.trim();

      // Remove any existing status messages
      const existingStatus = form.querySelector('.login-status');
      if (existingStatus) existingStatus.remove();

      const statusEl = document.createElement('div');
      statusEl.className = 'login-status';
      form.appendChild(statusEl);

      try {
        const API_BASE = (typeof KBConfig !== 'undefined') ? KBConfig.API_BASE : 'http://127.0.0.1:8000';
        const payload = { username, password };
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          const detail = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
          statusEl.innerHTML = `<div class='text-danger mt-2'>${detail || 'Login failed'}</div>`;
          return;
        }

        // Save auth data using KBAuth or fallback to localStorage
        if (typeof KBAuth !== 'undefined') {
          KBAuth.saveAuth(data.access_token, data.role || 'User', { username });
        } else {
          localStorage.setItem('kb_token', data.access_token);
          localStorage.setItem('kb_role', data.role || 'User');
        }

        statusEl.innerHTML = `<div class='text-success mt-2'>Login successful! Redirecting...</div>`;
        setTimeout(() => { window.location.href = 'index.html'; }, 500);
      } catch (err) {
        statusEl.innerHTML = `<div class='text-danger mt-2'>Login error: ${err.message}</div>`;
      }
    });
  </script>

  <script>
    // Password visibility toggle
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.input-group').querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
      });
    });
  </script>

</body>

</html>
