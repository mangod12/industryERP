<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KumarBrothers — Instructions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="css/main.css" rel="stylesheet">
  <style>
    .instr-card {
      border-left: 4px solid #0d6efd;
      transition: box-shadow 0.2s;
    }

    .instr-card:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .instr-meta {
      font-size: 0.82rem;
      color: #6c757d;
    }

    .instr-msg {
      white-space: pre-wrap;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <nav class="kb-navbar d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
      <div class="navbar-brand">KumarBrothers</div>
      <div class="d-none d-lg-flex">
        <a class="nav-link text-white ms-3" href="index.html">Dashboard</a>
        <a class="nav-link text-white ms-3" href="raw_material.html">Inventory</a>
        <a class="nav-link text-white ms-3" href="scrap.html">Scrap</a>
        <a class="nav-link text-white ms-3" href="reusable.html">Reusable</a>
        <a class="nav-link text-white ms-3" href="customers.html">Customers</a>
        <a class="nav-link text-white ms-3" href="tracking_v2.html">Tracking</a>
        <a class="nav-link text-white ms-3" href="queries.html">Querys</a>
        <a class="nav-link text-white ms-3" href="instructions.html">Instructions</a>
        <a class="nav-link text-white ms-3" href="settings.html">Settings</a>
        <a class="nav-link text-white ms-3" href="register.html" data-permission="users:create">Register</a>
        <a class="nav-link text-white ms-3 kb-logout" href="#">Logout</a>
      </div>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="small-muted">Role:</div>
      <div id="current-role" class="role-badge">Loading...</div>
    </div>
  </nav>

  <div class="container-fluid main-container">
    <div class="row">
      <div class="col-12 mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <div class="kb-section-title">Instructions</div>
            <div class="small-muted">View and manage instructions from Boss</div>
          </div>
          <div id="addBtnWrap"></div>
        </div>
      </div>

      <!-- Compose card (Boss only) -->
      <div class="col-lg-5" id="composeCard" style="display:none;">
        <div class="card kb-card p-3 mb-3">
          <label class="form-label fw-bold">New Instruction</label>
          <textarea id="instruction-text" class="form-control mb-2" rows="4"
            placeholder="Type your instruction here..."></textarea>
          <div class="d-flex justify-content-between align-items-center">
            <div id="instrStatus" class="small text-muted"></div>
            <button id="instr-submit" class="btn btn-kb">Submit</button>
          </div>
        </div>
      </div>

      <!-- Instruction list -->
      <div class="col-lg-7" id="instrListCol">
        <div id="instruction-list">
          <div class="text-muted">Loading instructions...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>
    const API_BASE = (typeof KBConfig !== 'undefined') ? KBConfig.API_BASE : 'http://127.0.0.1:8000';

    function authHeaders() {
      const token = (typeof KBAuth !== 'undefined') ? KBAuth.getToken() : localStorage.getItem('kb_token');
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    const currentRole = (typeof KBAuth !== 'undefined') ? KBAuth.getRole() : (localStorage.getItem('kb_role') || 'User');
    const isBoss = currentRole === 'Boss';

    // Show compose card and add button only for Boss
    if (isBoss) {
      document.getElementById('composeCard').style.display = '';
      document.getElementById('addBtnWrap').innerHTML = '<a href="instructions_edit.html" class="btn btn-kb">✏️ Edit Page</a>';
      // Make list full width when compose is visible
      document.getElementById('instrListCol').className = 'col-lg-7';
    } else {
      document.getElementById('instrListCol').className = 'col-lg-12';
    }

    // Submit new instruction
    document.getElementById('instr-submit')?.addEventListener('click', async () => {
      const textEl = document.getElementById('instruction-text');
      const statusEl = document.getElementById('instrStatus');
      const text = textEl.value.trim();
      if (!text) return alert('Please enter instruction text');

      statusEl.innerText = 'Submitting...';
      try {
        const res = await fetch(`${API_BASE}/instructions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ message: text })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => null);
          statusEl.innerText = err?.detail || `Failed (${res.status})`;
          return;
        }
        textEl.value = '';
        statusEl.innerText = '✓ Instruction posted!';
        setTimeout(() => { statusEl.innerText = ''; }, 2000);
        loadInstructions();
      } catch (err) {
        statusEl.innerText = `Error: ${err.message}`;
      }
    });

    // Load and display all instructions
    async function loadInstructions() {
      const listEl = document.getElementById('instruction-list');
      listEl.innerHTML = '<div class="text-muted">Loading...</div>';
      try {
        const res = await fetch(`${API_BASE}/instructions`, {
          headers: authHeaders()
        });
        if (!res.ok) {
          listEl.innerHTML = '<div class="text-danger">Failed to load instructions</div>';
          return;
        }
        const items = await res.json();
        if (!items.length) {
          listEl.innerHTML = '<div class="text-muted">No instructions yet. The Boss can add instructions above.</div>';
          return;
        }
        listEl.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'card kb-card p-3 mb-2 instr-card';

          const dateStr = item.created_at ? new Date(item.created_at).toLocaleString() : '';
          const updatedStr = item.updated_at ? ` (edited ${new Date(item.updated_at).toLocaleString()})` : '';

          let actions = '';
          if (isBoss) {
            actions = `
                <div class="mt-2">
                  <a href="instructions_edit.html?id=${item.id}" class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i> Edit
                  </a>
                  <button class="btn btn-sm btn-outline-danger del-instr" data-id="${item.id}">
                    <i class="bi bi-trash"></i> Delete
                  </button>
                </div>
              `;
          }

          div.innerHTML = `
              <div class="instr-meta">
                <i class="bi bi-person-circle"></i> Boss &middot; ${dateStr}${updatedStr}
              </div>
              <div class="instr-msg">${escapeHtml(item.message)}</div>
              ${actions}
            `;
          listEl.appendChild(div);
        });

        // Wire delete buttons
        listEl.querySelectorAll('.del-instr').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            if (!confirm('Delete this instruction?')) return;
            try {
              const res = await fetch(`${API_BASE}/instructions/${id}`, {
                method: 'DELETE',
                headers: authHeaders()
              });
              if (!res.ok) {
                const err = await res.json().catch(() => null);
                alert(err?.detail || 'Delete failed');
                return;
              }
              loadInstructions();
            } catch (err) {
              alert('Error: ' + err.message);
            }
          });
        });

      } catch (err) {
        listEl.innerHTML = `<div class="text-danger">Error: ${err.message}</div>`;
      }
    }

    // Initial load
    loadInstructions();
  </script>
</body>

</html>
