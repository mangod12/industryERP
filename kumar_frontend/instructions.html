<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KumarBrothers — Instructions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="container-fluid main-container">
      <div class="row">
        <div class="col-12 mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="kb-section-title">Instructions</div>
              <div class="small-muted">Add instructions</div>
            </div>
            <div>
              <button class="btn btn-kb" data-role="Boss">Add Instruction</button>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card kb-card p-3" data-role="Boss">
            <label class="form-label">New Instruction</label>
            <textarea id="instruction-text" class="form-control mb-2" rows="4"></textarea>
            <div class="d-flex justify-content-end">
              <button id="instr-submit" class="btn btn-kb">Submit</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/modules/escapeHtml.js"></script>
    <script src="js/modules/navbar.js"></script>
    <script src="js/modules/debounce.js"></script>
    <script src="js/modules/store.js"></script>
    <script src="js/modules/error-handler.js"></script>
    <script src="js/modules/ui-components.js"></script>
    <script src="js/modules/pagination.js"></script>
    <script>
      if (!KBAuth.requireAuth()) throw new Error('Not authenticated');
      KBNavbar.render('navbar-container', 'settings');
    </script>
  </body>
</html>
