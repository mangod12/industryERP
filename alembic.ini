# Alembic Configuration for KBSteel ERP
# ========================================
# Default: SQLite dev database (overridden by DATABASE_URL env var)

[alembic]
script_location = alembic
prepend_sys_path = .

# Default SQLite dev URL — overridden at runtime by env.py
# when DATABASE_URL is set (e.g., PostgreSQL in production).
sqlalchemy.url = sqlite:///backend_core/data/kbsteel_dev.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
