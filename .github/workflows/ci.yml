name: KBSteel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check backend_core/
      - name: Format check
        run: ruff format --check backend_core/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install system deps for pycairo
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run all tests with coverage
        run: python -m pytest tests/ -v --ignore=tests/test_every_page.py --ignore=tests/test_full_user_flows.py --cov=backend_core/app --cov-report=term-missing --cov-report=xml --cov-fail-under=60
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Verify app starts
        run: |
          ENVIRONMENT=development python -c "from backend_core.app.main import app; print('App loaded OK')"

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps for pycairo
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install deps
        run: pip install -r requirements.txt && pip install mypy
      - name: Type check services
        run: mypy backend_core/app/services/ --ignore-missing-imports --no-strict-optional || true
        # Start permissive, tighten later

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kbsteel-backend:test .

      - name: Verify container starts
        run: |
          docker run -d --name kbtest \
            -e ENVIRONMENT=development \
            -e KUMAR_SECRET_KEY=ci-test-key-minimum-32-characters-long \
            -p 8080:8080 kbsteel-backend:test \
            gunicorn -w 1 -k uvicorn.workers.UvicornWorker backend_core.app.main:app --bind 0.0.0.0:8080 --timeout 30
          sleep 8
          curl -sf http://localhost:8080/version || (docker logs kbtest && exit 1)
          docker stop kbtest
